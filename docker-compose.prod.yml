# Docker Compose 生产环境配置
# 使用方法: docker-compose -f docker-compose.prod.yml up -d

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: exchange_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请设置 MYSQL_ROOT_PASSWORD 环境变量}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-test}
      MYSQL_USER: ${MYSQL_USER:-exchange}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?请设置 MYSQL_PASSWORD 环境变量}
    # 生产环境使用 volume 而不是 bind mount
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - exchange_network_prod
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # 生产环境健康检查
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: exchange_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    networks:
      - exchange_network_prod
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./Exchangeapp_backend
      dockerfile: Dockerfile
      # 生产环境优化构建
      args:
        - GO_BUILD_MODE=release
    image: exchange_backend:latest
    container_name: exchange_backend_prod
    restart: always
    expose:
      - "8080"
    environment:
      - DATABASE_DSN=${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-test}?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      - AI_APIKEY=${AI_APIKEY:-}
      - AI_BASEURL=${AI_BASEURL:-https://api.openai.com/v1}
    # 不挂载代码，只读镜像
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - exchange_network_prod
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务 (Nginx serve 静态文件)
  frontend:
    build:
      context: ./Exchangeapp_frontend
      dockerfile: Dockerfile
    image: exchange_frontend:latest
    container_name: exchange_frontend_prod
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - exchange_network_prod
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# 网络定义
networks:
  exchange_network_prod:
    driver: bridge

# 卷定义（持久化数据）
volumes:
  mysql_data_prod:
    driver: local
  redis_data_prod:
    driver: local
